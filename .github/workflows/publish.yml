name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi
          - crates
      ref:
        description: 'Existing tag name or full 40-character commit SHA to publish'
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-publish-ref:
    name: Resolve Publish Ref
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve immutable ref
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          MANUAL_REF: ${{ github.event.inputs.ref || '' }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "release" ]]; then
            requested_ref="$RELEASE_TAG"
          else
            requested_ref="$MANUAL_REF"
          fi

          if [[ -z "$requested_ref" ]]; then
            echo "An existing tag name or full 40-character commit SHA is required." >&2
            exit 1
          fi

          if git show-ref --tags --verify --quiet "refs/tags/$requested_ref"; then
            resolved_ref="$(git rev-list -n 1 "refs/tags/$requested_ref")"
          elif [[ "$requested_ref" =~ ^[0-9a-f]{40}$ ]] && git cat-file -e "${requested_ref}^{commit}" 2>/dev/null; then
            resolved_ref="$requested_ref"
          else
            echo "Publish ref must be an existing tag or full 40-character commit SHA." >&2
            exit 1
          fi

          git checkout --detach "$resolved_ref"
          echo "checkout_ref=$resolved_ref" >> "$GITHUB_OUTPUT"

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  linux-x86:
    runs-on: ubuntu-latest
    needs: [resolve-publish-ref]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-publish-ref.outputs.checkout_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-arm:
    runs-on: ubuntu-24.04-arm
    needs: [resolve-publish-ref]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-publish-ref.outputs.checkout_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: dist

  macos:
    runs-on: macos-14
    needs: [resolve-publish-ref]
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-publish-ref.outputs.checkout_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    needs: [resolve-publish-ref]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-publish-ref.outputs.checkout_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    runs-on: ubuntu-latest
    needs: [resolve-publish-ref]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-publish-ref.outputs.checkout_ref }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    needs: [resolve-publish-ref, linux-x86, linux-arm, macos, windows, sdist]
    environment:
      name: testpypi
      url: https://test.pypi.org/project/survival
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    needs: [resolve-publish-ref, linux-x86, linux-arm, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/survival
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check if version exists on PyPI
        id: check
        env:
          VERSION: ${{ needs.resolve-publish-ref.outputs.version }}
        run: |
          if curl -s "https://pypi.org/pypi/survival/${VERSION}/json" | grep -q '"version"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} already exists on PyPI, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} not found on PyPI, will publish"
          fi

      - uses: actions/download-artifact@v8
        if: steps.check.outputs.exists == 'false'
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'crates')
    needs: [resolve-publish-ref]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-publish-ref.outputs.checkout_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check if version exists on crates.io
        id: check
        env:
          VERSION: ${{ needs.resolve-publish-ref.outputs.version }}
        run: |
          if curl -s "https://crates.io/api/v1/crates/survival/${VERSION}" | grep -q '"version"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} already exists on crates.io, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} not found on crates.io, will publish"
          fi

      - name: Publish to crates.io
        if: steps.check.outputs.exists == 'false'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
